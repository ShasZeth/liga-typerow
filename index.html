<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga Typerów</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}
button{
    padding:10px 20px;
}
</style>
</head>
<body>

<div class="container">
    <h1>⚽ Liga Typerów</h1>

    <button id="loginBtn">Zaloguj przez Google</button>
    <p id="userInfo">Nie zalogowano</p>

<button id="logoutBtn" style="display:none;">
Wyloguj
</button>
    
    <div id="adminPanel" style="display:none;margin-top:20px;">

<h2>Panel administratora</h2>

<input id="homeTeam" placeholder="Gospodarze">

<input id="awayTeam" placeholder="Goście">

<button id="addMatchBtn">
Dodaj mecz
</button>

</div>

<hr>

<h2>Mecze</h2>

<div id="matchesList">
Brak meczów
</div>

<hr>

<button id="showRankingBtn">
🏆 Ranking
</button>

<div id="rankingList" style="margin-top:20px;"></div>

    </div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
setDoc,
getDoc,
updateDoc,
query,
where
}
from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyApHCIyltmJZbO0aQhX5KY38_nbrC5fHGI",
authDomain: "ligatyperow-8bb23.firebaseapp.com",
projectId: "ligatyperow-8bb23",
storageBucket: "ligatyperow-8bb23.firebasestorage.app",
messagingSenderId: "41148235881",
appId: "1:41148235881:web:86d31b86c4a0589fcaa2f8",
measurementId: "G-F176F0NY3D"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "kimiszymi@gmail.com";

let currentUser = null;


// LOGOWANIE

document.getElementById("loginBtn")
.addEventListener("click", async ()=>{

const provider = new GoogleAuthProvider();

await signInWithPopup(auth, provider);

});


// WYLOGOWANIE

document.getElementById("logoutBtn")
.addEventListener("click", async ()=>{

await signOut(auth);

});


// OBSŁUGA STANU LOGOWANIA

onAuthStateChanged(auth,(user)=>{

if(user){

currentUser = user;

document.getElementById("userInfo").innerHTML =
"Zalogowany: " + user.displayName;

document.getElementById("loginBtn").style.display =
"none";

document.getElementById("logoutBtn").style.display =
"inline-block";

if(user.email === ADMIN_EMAIL){

document.getElementById("adminPanel").style.display =
"block";

}

}else{

currentUser = null;

document.getElementById("userInfo").innerHTML =
"Nie zalogowano";

document.getElementById("loginBtn").style.display =
"inline-block";

document.getElementById("logoutBtn").style.display =
"none";

document.getElementById("adminPanel").style.display =
"none";

}

});
    
async function loadMatches(){

console.log("Ładowanie meczów...");

const snapshot =
await getDocs(collection(db,"matches"));

console.log("Liczba dokumentów:", snapshot.size);

let html = "";

snapshot.forEach((doc)=>{

const match = doc.data();

html += `
<div style="padding:10px;border:1px solid #ccc;margin:10px 0;">

    <h3>
        ⚽ ${match.homeTeam} vs ${match.awayTeam}
    </h3>

    <input
        type="number"
        min="0"
        id="home_${doc.id}"
        placeholder="0"
        style="width:60px;"
    >

    :

    <input
        type="number"
        min="0"
        id="away_${doc.id}"
        placeholder="0"
        style="width:60px;"
    >

   <button onclick="savePrediction('${doc.id}')">
    Zapisz typ
</button>

<button onclick="showPredictions('${doc.id}')">
    📋 Pokaż typy
</button>

<div id="predictions_${doc.id}"></div>

<hr>

${currentUser && currentUser.email === ADMIN_EMAIL ? `
<h4>Wynik końcowy</h4>

<input
    type="number"
    min="0"
    id="result_home_${doc.id}"
    placeholder="0"
    style="width:60px;"
>

:

<input
    type="number"
    min="0"
    id="result_away_${doc.id}"
    placeholder="0"
    style="width:60px;"
>

<button onclick="saveResult('${doc.id}')">
    Zapisz wynik
</button>
` : ""}

${match.finished ? `
<p>
🏁 Wynik końcowy:
<b>${match.homeResult}:${match.awayResult}</b>
</p>
` : ""}

</div>
`;

});
    
if(html === ""){
    html = "Brak meczów";
}

document.getElementById("matchesList").innerHTML = html;

}

document.getElementById("addMatchBtn")
.addEventListener("click", async ()=>{

const homeTeam =
document.getElementById("homeTeam").value;

const awayTeam =
document.getElementById("awayTeam").value;

const round =
document.getElementById("round").value;

if(!homeTeam || !awayTeam){

    alert("Uzupełnij drużyny");
    return;

}

await addDoc(
    collection(db,"matches"),
    {
        homeTeam,
        awayTeam,
        createdAt: Date.now()
    }
);

alert("Mecz dodany");

document.getElementById("homeTeam").value = "";
document.getElementById("awayTeam").value = "";

loadMatches();

});
window.savePrediction = async function(matchId){

if(!currentUser){

alert("Najpierw się zaloguj");
return;

}

const homeScore =
document.getElementById(`home_${matchId}`).value;

const awayScore =
document.getElementById(`away_${matchId}`).value;

if(homeScore === "" || awayScore === ""){

alert("Podaj wynik");
return;

}

const predictionRef =
doc(
db,
"predictions",
matchId + "_" + currentUser.uid
);

const existingPrediction =
await getDoc(predictionRef);

if(existingPrediction.exists()){

alert("Wytypowales juz swoj Wynik!");
return;

}
 
await setDoc(
predictionRef,
{
matchId,
userId: currentUser.uid,
userName: currentUser.displayName,
homeScore: Number(homeScore),
awayScore: Number(awayScore),
createdAt: Date.now()
}
);

alert("Typ zapisany");

};

window.saveResult = async function(matchId){

if(!currentUser){
    alert("Zaloguj się");
    return;
}

if(currentUser.email !== ADMIN_EMAIL){
    alert("Tylko administrator może zapisać wynik");
    return;
}

const homeResult =
document.getElementById(`result_home_${matchId}`).value;

const awayResult =
document.getElementById(`result_away_${matchId}`).value;

if(homeResult === "" || awayResult === ""){
    alert("Podaj wynik końcowy");
    return;
}

await updateDoc(
    doc(db,"matches",matchId),
    {
        homeResult: Number(homeResult),
        awayResult: Number(awayResult),
        finished: true
    }
);

const predictionsQuery = query(
    collection(db,"predictions"),
    where("matchId","==",matchId)
);

const predictionsSnapshot =
await getDocs(predictionsQuery);

for(const predictionDoc of predictionsSnapshot.docs){

    const prediction = predictionDoc.data();

    let points = 0;

    const predictedHome = prediction.homeScore;
    const predictedAway = prediction.awayScore;

    const actualHome = Number(homeResult);
    const actualAway = Number(awayResult);

    // Dokładny wynik = 2 pkt

    if(
        predictedHome === actualHome &&
        predictedAway === actualAway
    ){

        points = 2;

    }else{

        // Trafiony zwycięzca lub remis = 1 pkt

        const predictedOutcome =
            predictedHome > predictedAway
            ? "HOME"
            : predictedHome < predictedAway
            ? "AWAY"
            : "DRAW";

        const actualOutcome =
            actualHome > actualAway
            ? "HOME"
            : actualHome < actualAway
            ? "AWAY"
            : "DRAW";

        if(predictedOutcome === actualOutcome){
            points = 1;
        }

    }

    await updateDoc(
        doc(db,"predictions",predictionDoc.id),
        {
            points: points
        }
    );

}

alert("Wynik zapisany i punkty naliczone");

loadMatches();

};

async function loadRanking(){

const snapshot =
await getDocs(collection(db,"predictions"));

const users = {};

snapshot.forEach((doc)=>{

const prediction = doc.data();

if(!users[prediction.userName]){
users[prediction.userName] = 0;
}

users[prediction.userName] +=
prediction.points || 0;

});

const ranking =
Object.entries(users)
.sort((a,b)=> b[1] - a[1]);

let html = "<h2>🏆 Ranking</h2>";

ranking.forEach((user,index)=>{

html += `
<div style="
padding:10px;
margin:5px 0;
border:1px solid #ccc;
">
${index + 1}. ${user[0]} - ${user[1]} pkt
</div>
`;

});

document.getElementById("rankingList").innerHTML =
html;

}

window.showPredictions = async function(matchId){

const predictionsQuery = query(
    collection(db,"predictions"),
    where("matchId","==",matchId)
);

const predictionsSnapshot =
await getDocs(predictionsQuery);

let html = "<h3>Typy użytkowników</h3>";

predictionsSnapshot.forEach((predictionDoc)=>{

    const prediction = predictionDoc.data();

    let color = "#999";

    if(prediction.points === 2){
        color = "green";
    }else if(prediction.points === 1){
        color = "orange";
    }else if(prediction.points === 0){
        color = "red";
    }

    html += `
    <div style="
        padding:8px;
        margin:4px 0;
        border:1px solid #ccc;
    ">
        <span style="
            color:${color};
            font-weight:bold;
        ">
            ${prediction.userName}
        </span>
        → ${prediction.homeScore}:${prediction.awayScore}
        (${prediction.points ?? "-"} pkt)
    </div>
    `;
});

document.getElementById(`predictions_${matchId}`).innerHTML =
html;

};

document.getElementById("showRankingBtn")
.addEventListener("click", ()=>{

loadRanking();

});

loadMatches();


</script>

</body>
</html>
