<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga Typerów</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}
button{
    padding:10px 20px;
}
</style>
</head>
<body>

<div class="container">
    <h1>⚽ Liga Typerów</h1>

    <button id="loginBtn">Zaloguj przez Google</button>

    <p id="userInfo">Nie zalogowano</p>
    
    <div id="adminPanel" style="display:none;margin-top:20px;">

<h2>Panel administratora</h2>

<input id="homeTeam" placeholder="Gospodarze">

<input id="awayTeam" placeholder="Goście">

<button id="addMatchBtn">
Dodaj mecz
</button>

</div>

<hr>

<h2>Mecze</h2>

<div id="matchesList">
Brak meczów
</div>

    </div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
setDoc
}
from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyApHCIyltmJZbO0aQhX5KY38_nbrC5fHGI",
authDomain: "ligatyperow-8bb23.firebaseapp.com",
projectId: "ligatyperow-8bb23",
storageBucket: "ligatyperow-8bb23.firebasestorage.app",
messagingSenderId: "41148235881",
appId: "1:41148235881:web:86d31b86c4a0589fcaa2f8",
measurementId: "G-F176F0NY3D"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const ADMIN_EMAIL = "kimiszymi@gmail.com";
    
const db = getFirestore(app);
    let currentUser = null;

    
document.getElementById("loginBtn")
.addEventListener("click", async ()=>{

const provider = new GoogleAuthProvider();

await signInWithPopup(auth, provider);

});

onAuthStateChanged(auth,(user)=>{

if(user){

currentUser = user;

console.log("Email użytkownika:", user.email);
  

document.getElementById("userInfo").innerHTML =
"Zalogowany: " + user.displayName;

if(user.email === ADMIN_EMAIL){

document.getElementById("adminPanel").style.display =
"block";

}

}else{

document.getElementById("userInfo").innerHTML =
"Nie zalogowano";

}

});
    
async function loadMatches(){

console.log("Ładowanie meczów...");

const snapshot =
await getDocs(collection(db,"matches"));

console.log("Liczba dokumentów:", snapshot.size);

let html = "";

snapshot.forEach((doc)=>{

const match = doc.data();

html += `
<div style="padding:10px;border:1px solid #ccc;margin:10px 0;">

    <h3>
        ⚽ ${match.homeTeam} vs ${match.awayTeam}
    </h3>

    <input
        type="number"
        min="0"
        id="home_${doc.id}"
        placeholder="0"
        style="width:60px;"
    >

    :

    <input
        type="number"
        min="0"
        id="away_${doc.id}"
        placeholder="0"
        style="width:60px;"
    >

    <button onclick="savePrediction('${doc.id}')">
        Zapisz typ
    </button>

</div>
`;

});
    
if(html === ""){
    html = "Brak meczów";
}

document.getElementById("matchesList").innerHTML = html;

}

document.getElementById("addMatchBtn")
.addEventListener("click", async ()=>{

const homeTeam =
document.getElementById("homeTeam").value;

const awayTeam =
document.getElementById("awayTeam").value;

if(!homeTeam || !awayTeam){

    alert("Uzupełnij drużyny");
    return;

}

await addDoc(
    collection(db,"matches"),
    {
        homeTeam,
        awayTeam,
        createdAt: Date.now()
    }
);

alert("Mecz dodany");

document.getElementById("homeTeam").value = "";
document.getElementById("awayTeam").value = "";

loadMatches();

});
window.savePrediction = async function(matchId){

if(!currentUser){

alert("Najpierw się zaloguj");
return;

}

const homeScore =
document.getElementById(`home_${matchId}`).value;

const awayScore =
document.getElementById(`away_${matchId}`).value;

if(homeScore === "" || awayScore === ""){

alert("Podaj wynik");
return;

}

await setDoc(
doc(
db,
"predictions",
matchId + "_" + currentUser.uid
),
{
matchId,
userId: currentUser.uid,
userName: currentUser.displayName,
homeScore: Number(homeScore),
awayScore: Number(awayScore),
createdAt: Date.now()
}
);

alert("Typ zapisany");

};
loadMatches();

</script>

</body>
</html>
